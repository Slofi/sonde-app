<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonde Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    :root {
      --accent: #deaf4a;
      --accent-faint: rgba(222,175,74,0.10);
      --accent-mid: rgba(222,175,74,0.30);
      --accent-bg: rgba(222,175,74,0.07);
      --accent-muted: #a89060;
      --bg: #0a0a12;
      --bg2: #12121f;
      --bg3: #1a1a2e;
      --text: #e0e8ff;
      --text-muted: #7a8aaa;
      --border: rgba(255,255,255,0.07);
      --green: #3ddc84;
      --red: #ff5050;
      --sidebar-w: 280px;
      --header-h: 52px;
      --telem-h: 90px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }

    #header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      background: linear-gradient(160deg, rgba(10,10,18,0.5) 0%, rgba(18,18,31,0.5) 100%);
      border-bottom: 1px solid var(--accent-faint);
      position: relative;
      z-index: 1000;
    }
    #header h1 { font-size: 0.9rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); }
    #header h1 i { margin-right: 8px; }
    #conn-status { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); }
    #conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); transition: background 0.3s, box-shadow 0.3s; }
    #conn-dot.on  { background: var(--green); box-shadow: 0 0 7px rgba(61,220,132,0.55); }
    #conn-dot.off { background: var(--red);   box-shadow: 0 0 7px rgba(255,80,80,0.4); }
    .spacer { flex: 1; }

    #layer-btns { display: flex; gap: 4px; }
    .layer-btn {
      font-size: 0.7rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s;
    }
    .layer-btn:hover { color: var(--text); border-color: var(--accent-mid); }
    .layer-btn.active { background: var(--accent-bg); border-color: var(--accent-mid); color: var(--accent); }

    #main { display: flex; height: calc(100vh - var(--header-h) - var(--telem-h)); }

    #sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      background: var(--bg); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden; z-index: 100;
    }
    .side-section { display: flex; flex-direction: column; overflow: hidden; }
    .side-section.presets { flex: 1; }
    .side-section.sondes { flex: 0 0 auto; max-height: 220px; border-top: 1px solid var(--border); }
    .side-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent-muted);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .icon-btn {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 0.8rem; padding: 2px 5px;
      border-radius: 4px; transition: color 0.15s, background 0.15s;
    }
    .icon-btn:hover { color: var(--accent); background: var(--accent-faint); }
    .side-list { overflow-y: auto; flex: 1; }
    .side-list::-webkit-scrollbar { width: 4px; }
    .side-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .preset-item {
      display: flex; align-items: center; padding: 9px 14px; gap: 10px;
      border-bottom: 1px solid var(--border); transition: background 0.1s;
    }
    .preset-item:hover { background: var(--accent-faint); }
    .preset-item.active-freq { background: rgba(61,220,132,0.06); }
    .preset-country { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.05em; min-width: 24px; }
    .preset-info { flex: 1; min-width: 0; }
    .preset-name { font-size: 0.82rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .preset-meta { font-size: 0.65rem; color: var(--text-muted); margin-top: 1px; }
    .preset-freq { font-size: 0.8rem; font-weight: 600; color: var(--accent); font-variant-numeric: tabular-nums; }
    .preset-edit-btn {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 0.72rem; padding: 3px 5px;
      border-radius: 4px; opacity: 0.45; transition: all 0.15s;
    }
    .preset-edit-btn:hover { opacity: 1; color: var(--accent); }

    .preset-edit-row { padding: 8px 14px; background: var(--bg3); border-bottom: 1px solid var(--border); display: none; }
    .preset-edit-row.open { display: block; }
    .edit-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
    .edit-fields input {
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      border-radius: 5px; color: var(--text); font-size: 0.75rem;
      padding: 4px 8px; width: 100%; outline: none;
    }
    .edit-fields input:focus { border-color: var(--accent-mid); }
    .edit-actions { display: flex; gap: 6px; }
    .edit-save-btn, .edit-del-btn, .edit-cancel-btn {
      font-size: 0.7rem; padding: 4px 10px; border-radius: 5px;
      border: 1px solid; cursor: pointer; font-weight: 500;
    }
    .edit-save-btn   { background: var(--accent-bg); border-color: var(--accent-mid); color: var(--accent); }
    .edit-cancel-btn { background: transparent; border-color: var(--border); color: var(--text-muted); }
    .edit-del-btn    { background: rgba(255,80,80,0.08); border-color: rgba(255,80,80,0.3); color: #ff6060; margin-left: auto; }

    #add-preset-btn {
      display: block; margin: 10px 14px; padding: 7px;
      background: var(--accent-faint); border: 1px dashed var(--accent-mid);
      border-radius: 8px; color: var(--accent-muted); font-size: 0.75rem;
      cursor: pointer; text-align: center; letter-spacing: 0.05em;
      width: calc(100% - 28px); transition: all 0.15s;
    }
    #add-preset-btn:hover { background: var(--accent-bg); color: var(--accent); }

    .sonde-item {
      display: flex; align-items: center; padding: 8px 14px; gap: 10px;
      border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s;
    }
    .sonde-item:hover, .sonde-item.selected { background: var(--accent-faint); }
    .sonde-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px rgba(61,220,132,0.5); flex-shrink: 0; }
    .sonde-info { flex: 1; min-width: 0; }
    .sonde-call { font-size: 0.8rem; font-weight: 600; color: var(--text); }
    .sonde-sub  { font-size: 0.68rem; color: var(--text-muted); margin-top: 1px; }
    .sonde-alt  { font-size: 0.78rem; color: var(--accent); font-variant-numeric: tabular-nums; }
    #no-sondes  { padding: 16px 14px; font-size: 0.75rem; color: var(--text-muted); text-align: center; }

    #map { flex: 1; height: 100%; }
    .leaflet-container { background: var(--bg); }
    .leaflet-control-zoom a { background: var(--bg2) !important; color: var(--text) !important; border-color: var(--border) !important; }
    .leaflet-control-zoom a:hover { background: var(--bg3) !important; }
    .sonde-marker-icon { background: none; border: none; }

    #telem-bar {
      height: var(--telem-h); background: var(--bg2);
      border-top: 1px solid var(--accent-faint);
      display: flex; align-items: center; padding: 0 20px; overflow: hidden;
    }
    #telem-bar.hidden { visibility: hidden; }
    .telem-callsign { min-width: 140px; padding-right: 20px; border-right: 1px solid var(--border); }
    .telem-call-label { font-size: 0.62rem; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
    .telem-call-val { font-size: 1rem; font-weight: 700; color: var(--accent); letter-spacing: 0.05em; }
    .telem-call-sub { font-size: 0.65rem; color: var(--text-muted); margin-top: 2px; }
    .telem-fields { display: flex; flex: 1; }
    .telem-field { flex: 1; padding: 0 16px; border-right: 1px solid var(--border); text-align: center; }
    .telem-field:last-child { border-right: none; }
    .telem-label { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
    .telem-val { font-size: 1rem; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
    .telem-unit { font-size: 0.6rem; color: var(--text-muted); margin-left: 2px; }
  </style>
</head>
<body>

<div id="header">
  <h1><i class="fa-solid fa-satellite-dish"></i>Sonde</h1>
  <div id="conn-status">
    <div id="conn-dot"></div>
    <span id="conn-label">Connecting...</span>
  </div>
  <div class="spacer"></div>
  <div id="layer-btns">
    <button class="layer-btn active" onclick="setLayer('osm')">OSM</button>
    <button class="layer-btn" onclick="setLayer('topo')">Topo</button>
    <button class="layer-btn" onclick="setLayer('mt')">MT Topo</button>
    <button class="layer-btn" onclick="setLayer('sat')">Sat</button>
  </div>
</div>

<div id="main">
  <div id="sidebar">
    <div class="side-section presets">
      <div class="side-header">
        Frequency Presets
        <button class="icon-btn" onclick="addPreset()" title="Add preset"><i class="fa-solid fa-plus"></i></button>
      </div>
      <div class="side-list" id="presets-list"></div>
    </div>
    <div class="side-section sondes">
      <div class="side-header">Active Sondes</div>
      <div class="side-list" id="sondes-list">
        <div id="no-sondes">No sondes detected</div>
      </div>
    </div>
  </div>
  <div id="map"></div>
</div>

<div id="telem-bar" class="hidden">
  <div class="telem-callsign">
    <div class="telem-call-label">Callsign</div>
    <div class="telem-call-val" id="t-callsign">—</div>
    <div class="telem-call-sub" id="t-type">—</div>
  </div>
  <div class="telem-fields">
    <div class="telem-field"><div class="telem-label">Altitude</div><div class="telem-val" id="t-alt">—<span class="telem-unit">m</span></div></div>
    <div class="telem-field"><div class="telem-label">Climb</div><div class="telem-val" id="t-climb">—<span class="telem-unit">m/s</span></div></div>
    <div class="telem-field"><div class="telem-label">Speed</div><div class="telem-val" id="t-speed">—<span class="telem-unit">km/h</span></div></div>
    <div class="telem-field"><div class="telem-label">Temp</div><div class="telem-val" id="t-temp">—<span class="telem-unit">°C</span></div></div>
    <div class="telem-field"><div class="telem-label">Humidity</div><div class="telem-val" id="t-hum">—<span class="telem-unit">%</span></div></div>
    <div class="telem-field"><div class="telem-label">Frequency</div><div class="telem-val" id="t-freq">—<span class="telem-unit">MHz</span></div></div>
    <div class="telem-field"><div class="telem-label">SNR</div><div class="telem-val" id="t-snr">—<span class="telem-unit">dB</span></div></div>
  </div>
</div>

<script>
// ===== MAP =====
const map = L.map('map', { center: [46.5, 14.5], zoom: 7 });

const layers = {
  osm:  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 }),
  topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',  { attribution: '© OpenTopoMap',  maxZoom: 17 }),
  mt:   L.tileLayer('https://tile.waymarkedtrails.org/hiking/{z}/{x}/{y}.png', {
          attribution: '© Waymarked Trails / OpenStreetMap', maxZoom: 19, opacity: 0.7
        }),
  sat:  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '© Esri', maxZoom: 18 }),
};

// MT Topo = OSM base + hiking overlay
const mtBase = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 });
layers.osm.addTo(map);
let currentLayer = 'osm';
let mtOverlay = null;

function setLayer(name) {
  if (name === currentLayer) return;

  // Remove previous base + any MT overlay
  if (mtOverlay) { map.removeLayer(mtOverlay); mtOverlay = null; }
  if (currentLayer === 'mt') { map.removeLayer(mtBase); }
  else { map.removeLayer(layers[currentLayer]); }

  if (name === 'mt') {
    mtBase.addTo(map);
    mtOverlay = layers.mt;
    mtOverlay.addTo(map);
  } else {
    layers[name].addTo(map);
  }

  currentLayer = name;
  document.querySelectorAll('.layer-btn').forEach(b =>
    b.classList.toggle('active', b.textContent.trim().toLowerCase().replace(' ','') === name)
  );
}

// ===== SONDES =====
const sondes = {};
let selectedSonde = null;

const COLORS = ['#deaf4a','#56b6c2','#c678dd','#98c379','#e06c75','#61afef','#d19a66','#e5c07b'];
function sondeColor(id) {
  let h = 0; for (const c of id) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
  return COLORS[Math.abs(h) % COLORS.length];
}

function makeSondeIcon(id) {
  const col = sondeColor(id);
  return L.divIcon({
    className: 'sonde-marker-icon',
    html: `<svg width="26" height="34" viewBox="0 0 26 34">
      <circle cx="13" cy="13" r="10" fill="${col}" opacity="0.92" stroke="#0a0a12" stroke-width="2"/>
      <line x1="13" y1="23" x2="13" y2="34" stroke="${col}" stroke-width="2" opacity="0.6"/>
      <text x="13" y="17" text-anchor="middle" font-size="10" fill="#0a0a12" font-weight="700">↑</text>
    </svg>`,
    iconSize: [26, 34], iconAnchor: [13, 34], popupAnchor: [0, -36],
  });
}

function updateSonde(data) {
  const id = data.callsign;
  if (!id || data.lat == null || data.lon == null) return;
  const pos = [data.lat, data.lon];
  const col = sondeColor(id);

  if (!sondes[id]) {
    const marker = L.marker(pos, { icon: makeSondeIcon(id) }).addTo(map);
    marker.bindPopup(`<b style="color:#deaf4a">${id}</b><br>${data.type||''} · ${data.freq||''} MHz`);
    marker.on('click', () => selectSonde(id));
    const polyline = L.polyline([pos], { color: col, weight: 2, opacity: 0.65 }).addTo(map);
    sondes[id] = { telem: data, marker, track: [pos], polyline };
  } else {
    sondes[id].telem = data;
    sondes[id].marker.setLatLng(pos);
    sondes[id].track.push(pos);
    sondes[id].polyline.setLatLngs(sondes[id].track);
  }

  renderSondeList();
  if (selectedSonde === id) updateTelemBar(data);
}

function selectSonde(id) {
  selectedSonde = id;
  document.querySelectorAll('.sonde-item').forEach(el => el.classList.toggle('selected', el.dataset.id === id));
  if (sondes[id]) {
    updateTelemBar(sondes[id].telem);
    map.panTo([sondes[id].telem.lat, sondes[id].telem.lon]);
  }
}

function fmt(v, dec=0) {
  return v != null && !isNaN(v) ? parseFloat(v).toFixed(dec) : '—';
}

function updateTelemBar(d) {
  document.getElementById('telem-bar').classList.remove('hidden');
  document.getElementById('t-callsign').textContent = d.callsign || '—';
  document.getElementById('t-type').textContent = [d.type, d.freq ? d.freq+' MHz' : ''].filter(Boolean).join(' · ');
  document.getElementById('t-alt').innerHTML   = fmt(d.alt)   + '<span class="telem-unit">m</span>';
  document.getElementById('t-climb').innerHTML = fmt(d.vel_v,1) + '<span class="telem-unit">m/s</span>';
  const spd = d.vel_h != null ? d.vel_h * 3.6 : null;
  document.getElementById('t-speed').innerHTML = fmt(spd,1) + '<span class="telem-unit">km/h</span>';
  document.getElementById('t-temp').innerHTML  = fmt(d.temp,1) + '<span class="telem-unit">°C</span>';
  document.getElementById('t-hum').innerHTML   = fmt(d.humidity,0) + '<span class="telem-unit">%</span>';
  document.getElementById('t-freq').innerHTML  = fmt(d.freq,3) + '<span class="telem-unit">MHz</span>';
  document.getElementById('t-snr').innerHTML   = fmt(d.snr,1) + '<span class="telem-unit">dB</span>';
}

function renderSondeList() {
  const list = document.getElementById('sondes-list');
  const ids = Object.keys(sondes);
  if (!ids.length) { list.innerHTML = '<div id="no-sondes">No sondes detected</div>'; return; }
  list.innerHTML = ids.map(id => {
    const d = sondes[id].telem;
    const alt = d.alt != null ? Math.round(d.alt)+'m' : '—';
    return `<div class="sonde-item${selectedSonde===id?' selected':''}" data-id="${id}" onclick="selectSonde('${id}')">
      <div class="sonde-dot"></div>
      <div class="sonde-info">
        <div class="sonde-call">${id}</div>
        <div class="sonde-sub">${d.type||'?'} · ${d.freq||'?'} MHz</div>
      </div>
      <div class="sonde-alt">${alt}</div>
    </div>`;
  }).join('');
}

// ===== PRESETS =====
let presets = [];
let editingId = null;

async function loadPresets() {
  const r = await fetch('/api/presets');
  presets = await r.json();
  renderPresets();
}

async function savePresets() {
  await fetch('/api/presets', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(presets),
  });
}

function renderPresets() {
  const list = document.getElementById('presets-list');
  const activeFreqs = new Set(Object.values(sondes).map(s => parseFloat(s.telem.freq).toFixed(2)));
  list.innerHTML = presets.map(p => {
    const isActive = activeFreqs.has(parseFloat(p.freq).toFixed(2));
    const editOpen = editingId === p.id;
    const meta = [p.type, !p.verified ? '·̈ unverified' : ''].filter(Boolean).join(' ');
    return `<div class="preset-item${isActive?' active-freq':''}">
      <div class="preset-country">${p.country}</div>
      <div class="preset-info">
        <div class="preset-name">${p.name}</div>
        <div class="preset-meta">${meta}</div>
      </div>
      <div class="preset-freq">${parseFloat(p.freq).toFixed(2)}</div>
      <button class="preset-edit-btn" onclick="toggleEdit('${p.id}')" title="Edit"><i class="fa-solid fa-pen"></i></button>
    </div>
    <div class="preset-edit-row${editOpen?' open':''}" id="edit-${p.id}">
      <div class="edit-fields">
        <input type="text"   id="ef-name-${p.id}"    value="${p.name}"    placeholder="Name">
        <input type="text"   id="ef-country-${p.id}" value="${p.country}" placeholder="Country" maxlength="3">
        <input type="number" id="ef-freq-${p.id}"    value="${p.freq}"    placeholder="MHz" step="0.05">
        <input type="text"   id="ef-type-${p.id}"    value="${p.type||''}" placeholder="Type">
      </div>
      <div class="edit-actions">
        <button class="edit-save-btn"   onclick="savePreset('${p.id}')">Save</button>
        <button class="edit-cancel-btn" onclick="toggleEdit(null)">Cancel</button>
        <button class="edit-del-btn"    onclick="deletePreset('${p.id}')">Delete</button>
      </div>
    </div>`;
  }).join('');
  const addBtn = document.createElement('button');
  addBtn.id = 'add-preset-btn';
  addBtn.textContent = '+ Add preset';
  addBtn.onclick = addPreset;
  list.appendChild(addBtn);
}

function toggleEdit(id) {
  editingId = editingId === id ? null : id;
  renderPresets();
  if (editingId) {
    const el = document.getElementById(`edit-${editingId}`);
    if (el) el.scrollIntoView({block: 'nearest'});
  }
}

function savePreset(id) {
  const p = presets.find(x => x.id === id);
  if (!p) return;
  p.name    = document.getElementById(`ef-name-${id}`).value.trim();
  p.country = document.getElementById(`ef-country-${id}`).value.trim().toUpperCase();
  p.freq    = parseFloat(document.getElementById(`ef-freq-${id}`).value);
  p.type    = document.getElementById(`ef-type-${id}`).value.trim();
  p.verified = false;
  editingId = null;
  savePresets();
  renderPresets();
}

function deletePreset(id) {
  presets = presets.filter(p => p.id !== id);
  editingId = null;
  savePresets();
  renderPresets();
}

function addPreset() {
  const newId = 'custom_' + Date.now();
  presets.push({ id: newId, name: 'New Station', country: '??', freq: 403.00, type: 'RS41', verified: false });
  editingId = newId;
  savePresets();
  renderPresets();
  document.getElementById(`edit-${newId}`)?.scrollIntoView({block: 'nearest'});
}

// ===== SOCKET.IO → auto_rx =====
function connectAutoRx() {
  const dot   = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');
  try {
    const socket = io('http://localhost:5000', {
      transports: ['websocket'],
      reconnectionDelay: 3000,
      reconnectionAttempts: Infinity,
    });
    socket.on('connect',       () => { dot.className = 'on';  label.textContent = 'Connected'; });
    socket.on('disconnect',    () => { dot.className = 'off'; label.textContent = 'Disconnected'; });
    socket.on('connect_error', () => { dot.className = 'off'; label.textContent = 'auto_rx offline'; });
    socket.on('telemetry_data', updateSonde);
  } catch(e) {
    dot.className = 'off';
    label.textContent = 'Error';
  }
}

loadPresets();
connectAutoRx();
</script>
</body>
</html>
