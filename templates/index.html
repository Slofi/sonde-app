<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonde App</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    :root {
      --accent: #deaf4a;
      --accent-faint: rgba(222,175,74,0.10);
      --accent-mid: rgba(222,175,74,0.30);
      --accent-bg: rgba(222,175,74,0.07);
      --accent-muted: #a89060;
      --bg: #0a0a12;
      --bg2: #12121f;
      --bg3: #1a1a2e;
      --text: #e0e8ff;
      --text-muted: #7a8aaa;
      --border: rgba(255,255,255,0.07);
      --green: #3ddc84;
      --red: #ff5050;
      --sidebar-w: 280px;
      --header-h: 52px;
      --telem-h: 90px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }

    #header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      background: linear-gradient(160deg, rgba(10,10,18,0.5) 0%, rgba(18,18,31,0.5) 100%);
      border-bottom: 1px solid var(--accent-faint);
      position: relative;
      z-index: 1000;
    }
    #header h1 { font-size: 0.9rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); white-space: nowrap; }
    #header h1 i { margin-right: 8px; }
    #conn-status { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); white-space: nowrap; }
    #conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); transition: background 0.3s, box-shadow 0.3s; }
    #conn-dot.on  { background: var(--green); box-shadow: 0 0 7px rgba(61,220,132,0.55); }
    #conn-dot.off { background: var(--red);   box-shadow: 0 0 7px rgba(255,80,80,0.4); }
    .spacer { flex: 1; }

    .header-btn {
      font-size: 0.7rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
      padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; gap: 5px; white-space: nowrap;
    }
    .header-btn:hover { color: var(--text); border-color: var(--accent-mid); }
    .header-btn.active { background: var(--accent-bg); border-color: var(--accent-mid); color: var(--accent); }
    .header-btn.danger:hover { color: var(--red); border-color: rgba(255,80,80,0.4); }

    .icon-btn {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      cursor: pointer; font-size: 0.8rem; padding: 5px 8px;
      border-radius: 6px; transition: color 0.15s, background 0.15s, border-color 0.15s;
    }
    .icon-btn:hover { color: var(--accent); background: var(--accent-faint); border-color: var(--accent-mid); }

    /* ── Draw panel ── */
    #draw-panel {
      display: none; position: absolute; top: calc(var(--header-h) + 6px); right: 130px;
      background: var(--bg2); border: 1px solid var(--accent-mid); border-radius: 8px;
      padding: 10px 12px; flex-direction: column; gap: 6px; z-index: 2000; min-width: 170px;
    }
    #draw-panel.open { display: flex; }
    .draw-group-label {
      font-size: 0.62rem; color: var(--accent-muted); letter-spacing: 0.1em;
      text-transform: uppercase; margin: 4px 0 2px;
    }
    .draw-group-label:first-child { margin-top: 0; }
    .draw-tool-btn {
      display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 5px;
      cursor: pointer; font-size: 0.78rem; color: var(--text-muted);
      background: none; border: 1px solid transparent; transition: all 0.12s; text-align: left; width: 100%;
    }
    .draw-tool-btn:hover { background: var(--accent-faint); color: var(--text); border-color: var(--border); }
    .draw-tool-btn.active { background: var(--accent-bg); border-color: var(--accent-mid); color: var(--accent); }
    .draw-tool-btn i { width: 13px; text-align: center; font-size: 0.72rem; }
    .draw-sep { border: none; border-top: 1px solid var(--border); margin: 3px 0; }
    .draw-action-btn {
      display: flex; align-items: center; gap: 7px; padding: 5px 8px; border-radius: 5px;
      cursor: pointer; font-size: 0.74rem; font-weight: 500;
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      transition: all 0.12s; text-align: left; width: 100%;
    }
    .draw-action-btn:hover { color: var(--text); border-color: var(--accent-mid); }
    .draw-action-btn.finish { background: var(--accent-bg); border-color: var(--accent-mid); color: var(--accent); }
    .draw-action-btn.danger:hover { color: var(--red); border-color: rgba(255,80,80,0.4); }
    #draw-info { font-size: 0.72rem; color: var(--accent-muted); padding: 2px 4px; min-height: 16px; }

    /* ── Floating draw toolbar (shown while tool active) ── */
    #draw-toolbar {
      position: fixed;
      bottom: calc(var(--telem-h) + 14px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg2);
      border: 1px solid var(--accent-mid);
      border-radius: 10px;
      padding: 7px 12px;
      display: none;
      align-items: center;
      gap: 8px;
      z-index: 1500;
      box-shadow: 0 4px 18px rgba(0,0,0,0.5);
      white-space: nowrap;
    }
    #draw-toolbar.show { display: flex; }
    #draw-toolbar-icon { color: var(--accent); font-size: 0.8rem; }
    #draw-toolbar-label { font-size: 0.75rem; font-weight: 600; color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase; }
    #draw-toolbar-info { font-size: 0.75rem; color: var(--text-muted); min-width: 80px; }
    .tb-sep { width: 1px; height: 18px; background: var(--border); margin: 0 2px; }
    .tb-btn {
      font-size: 0.72rem; font-weight: 500; padding: 4px 10px; border-radius: 6px;
      border: 1px solid var(--border); background: transparent; color: var(--text-muted);
      cursor: pointer; transition: all 0.12s; display: flex; align-items: center; gap: 5px;
    }
    .tb-btn:hover { color: var(--text); border-color: var(--accent-mid); }
    .tb-btn.finish { background: var(--accent-bg); border-color: var(--accent-mid); color: var(--accent); }
    .tb-btn.danger:hover { color: var(--red); border-color: rgba(255,80,80,0.4); }

    /* Banner */
    #draw-banner {
      position: absolute; top: calc(var(--header-h) + 8px); left: 50%; transform: translateX(-50%);
      background: var(--bg2); border: 1px solid var(--accent-mid); border-radius: 6px;
      padding: 5px 14px; font-size: 0.74rem; color: var(--text); z-index: 900;
      pointer-events: none; white-space: nowrap; display: none;
    }
    #draw-banner.show { display: block; }

    /* Crosshair cursor during drawing */
    #map.draw-active { cursor: crosshair !important; }

    /* ── Burger menu ── */

    #burger-btn { position: relative; }
    #burger-panel {
      display: none; position: absolute; top: calc(var(--header-h) + 6px); right: 10px;
      background: var(--bg2); border: 1px solid var(--accent-mid); border-radius: 8px;
      padding: 10px 0; flex-direction: column; z-index: 2000; min-width: 210px;
    }
    #burger-panel.open { display: flex; }
    .burger-version {
      font-size: 0.68rem; color: var(--text-muted); letter-spacing: 0.08em;
      padding: 2px 14px 8px; border-bottom: 1px solid var(--border); margin-bottom: 4px;
    }
    .burger-version span { color: var(--accent); font-variant-numeric: tabular-nums; }
    .burger-item {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 14px; font-size: 0.78rem; color: var(--text-muted);
      cursor: pointer; background: none; border: none; width: 100%; text-align: left;
      transition: background 0.12s, color 0.12s;
    }
    .burger-item:hover { background: var(--accent-faint); color: var(--text); }
    .burger-item i { width: 14px; text-align: center; color: var(--accent-muted); }
    .burger-item.danger:hover { background: rgba(255,80,80,0.08); color: var(--red); }
    .burger-item.danger:hover i { color: var(--red); }
    .burger-sep { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

    /* ── Layers panel ── */
    #layers-panel {
      display: none; position: absolute; top: calc(var(--header-h) + 6px); right: 10px;
      background: var(--bg2); border: 1px solid var(--accent-mid); border-radius: 8px;
      padding: 10px 12px; flex-direction: column; gap: 4px; z-index: 2000; min-width: 200px;
    }
    #layers-panel.open { display: flex; }
    .layers-group-label {
      font-size: 0.62rem; color: var(--accent-muted); letter-spacing: 0.1em;
      text-transform: uppercase; margin: 6px 0 3px;
    }
    .layers-group-label:first-child { margin-top: 0; }
    .layer-opt {
      display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 5px;
      cursor: pointer; font-size: 0.78rem; color: var(--text-muted);
      background: none; border: 1px solid transparent; transition: all 0.12s; text-align: left;
    }
    .layer-opt:hover { background: var(--accent-faint); color: var(--text); border-color: var(--border); }
    .layer-opt.active { background: var(--accent-bg); border-color: var(--accent-mid); color: var(--accent); }
    .layer-opt i { width: 13px; text-align: center; font-size: 0.72rem; }

    /* Local tileset picker */
    #local-panel {
      display: none; position: absolute; top: calc(var(--header-h) + 6px); right: 14px;
      background: var(--bg2); border: 1px solid var(--accent-mid); border-radius: 8px;
      padding: 10px 12px; flex-direction: column; gap: 6px; z-index: 2000; min-width: 220px;
    }
    #local-panel label { font-size: 0.68rem; color: var(--accent-muted); letter-spacing: 0.08em; text-transform: uppercase; }
    .local-layer-btn {
      font-size: 0.78rem; padding: 6px 10px; border-radius: 5px; cursor: pointer; text-align: left;
      background: var(--accent-faint); border: 1px solid var(--accent-mid); color: var(--text);
      transition: background 0.15s;
    }
    .local-layer-btn:hover { background: var(--accent-bg); color: var(--accent); }
    #local-no-tiles { font-size: 0.75rem; color: var(--text-muted); }

    /* MapTiler key panel */
    #key-panel {
      display: none; position: absolute; top: calc(var(--header-h) + 6px); right: 14px;
      background: var(--bg2); border: 1px solid var(--accent-mid); border-radius: 8px;
      padding: 10px 12px; gap: 8px; flex-direction: column; z-index: 2000; min-width: 260px;
    }
    #key-panel label { font-size: 0.68rem; color: var(--accent-muted); letter-spacing: 0.08em; text-transform: uppercase; }
    #mt-key-input {
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      border-radius: 5px; color: var(--text); font-size: 0.8rem;
      padding: 6px 10px; width: 100%; outline: none;
    }
    #mt-key-input:focus { border-color: var(--accent-mid); }
    #key-panel-btns { display: flex; gap: 6px; }
    .key-save-btn {
      font-size: 0.72rem; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-weight: 500;
      background: var(--accent-bg); border: 1px solid var(--accent-mid); color: var(--accent);
    }
    .key-cancel-btn {
      font-size: 0.72rem; padding: 5px 12px; border-radius: 5px; cursor: pointer;
      background: transparent; border: 1px solid var(--border); color: var(--text-muted);
    }

    #toast {
      position: fixed; bottom: calc(var(--telem-h) + 12px); left: 50%; transform: translateX(-50%);
      background: var(--bg2); border: 1px solid var(--accent-mid); border-radius: 8px;
      padding: 8px 18px; font-size: 0.78rem; color: var(--text); z-index: 3000;
      opacity: 0; transition: opacity 0.25s; pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    #main { display: flex; height: calc(100vh - var(--header-h) - var(--telem-h)); }

    #sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      background: var(--bg); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden; z-index: 100;
    }
    .side-section { display: flex; flex-direction: column; overflow: hidden; }
    .side-section.presets { flex: 1; }
    .side-section.sondes { flex: 0 0 auto; max-height: 220px; border-top: 1px solid var(--border); }
    .side-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent-muted);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .side-list { overflow-y: auto; flex: 1; }
    .side-list::-webkit-scrollbar { width: 4px; }
    .side-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .preset-item {
      display: flex; align-items: center; padding: 9px 14px; gap: 10px;
      border-bottom: 1px solid var(--border); transition: background 0.1s;
    }
    .preset-item:hover { background: var(--accent-faint); }
    .preset-item.active-freq { background: rgba(61,220,132,0.06); }
    .preset-country { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); letter-spacing: 0.05em; min-width: 24px; }
    .preset-info { flex: 1; min-width: 0; }
    .preset-name { font-size: 0.82rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .preset-meta { font-size: 0.65rem; color: var(--text-muted); margin-top: 1px; }
    .preset-freq { font-size: 0.8rem; font-weight: 600; color: var(--accent); font-variant-numeric: tabular-nums; }
    .preset-edit-btn {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 0.72rem; padding: 3px 5px;
      border-radius: 4px; opacity: 0.45; transition: all 0.15s;
    }
    .preset-edit-btn:hover { opacity: 1; color: var(--accent); }

    .preset-edit-row { padding: 8px 14px; background: var(--bg3); border-bottom: 1px solid var(--border); display: none; }
    .preset-edit-row.open { display: block; }
    .edit-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
    .edit-fields input {
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      border-radius: 5px; color: var(--text); font-size: 0.75rem;
      padding: 4px 8px; width: 100%; outline: none;
    }
    .edit-fields input:focus { border-color: var(--accent-mid); }
    .edit-actions { display: flex; gap: 6px; }
    .edit-save-btn, .edit-del-btn, .edit-cancel-btn {
      font-size: 0.7rem; padding: 4px 10px; border-radius: 5px;
      border: 1px solid; cursor: pointer; font-weight: 500;
    }
    .edit-save-btn   { background: var(--accent-bg); border-color: var(--accent-mid); color: var(--accent); }
    .edit-cancel-btn { background: transparent; border-color: var(--border); color: var(--text-muted); }
    .edit-del-btn    { background: rgba(255,80,80,0.08); border-color: rgba(255,80,80,0.3); color: #ff6060; margin-left: auto; }

    #add-preset-btn {
      display: block; margin: 10px 14px; padding: 7px;
      background: var(--accent-faint); border: 1px dashed var(--accent-mid);
      border-radius: 8px; color: var(--accent-muted); font-size: 0.75rem;
      cursor: pointer; text-align: center; letter-spacing: 0.05em;
      width: calc(100% - 28px); transition: all 0.15s;
    }
    #add-preset-btn:hover { background: var(--accent-bg); color: var(--accent); }

    .sonde-item {
      display: flex; align-items: center; padding: 8px 14px; gap: 10px;
      border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s;
    }
    .sonde-item:hover, .sonde-item.selected { background: var(--accent-faint); }
    .sonde-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px rgba(61,220,132,0.5); flex-shrink: 0; }
    .sonde-info { flex: 1; min-width: 0; }
    .sonde-call { font-size: 0.8rem; font-weight: 600; color: var(--text); }
    .sonde-sub  { font-size: 0.68rem; color: var(--text-muted); margin-top: 1px; }
    .sonde-alt  { font-size: 0.78rem; color: var(--accent); font-variant-numeric: tabular-nums; }
    .gpx-btn {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      cursor: pointer; font-size: 0.65rem; padding: 3px 6px;
      border-radius: 4px; transition: all 0.15s; white-space: nowrap;
    }
    .gpx-btn:hover { color: var(--accent); border-color: var(--accent-mid); background: var(--accent-faint); }
    #no-sondes  { padding: 16px 14px; font-size: 0.75rem; color: var(--text-muted); text-align: center; }

    #map { flex: 1; height: 100%; }
    .leaflet-container { background: var(--bg); }
    .leaflet-control-zoom a { background: var(--bg2) !important; color: var(--text) !important; border-color: var(--border) !important; }
    .leaflet-control-zoom a:hover { background: var(--bg3) !important; }
    .sonde-marker-icon { background: none; border: none; }

    #telem-bar {
      height: var(--telem-h); background: var(--bg2);
      border-top: 1px solid var(--accent-faint);
      display: flex; align-items: center; padding: 0 20px; overflow: hidden;
    }
    #telem-bar.hidden { visibility: hidden; }
    .telem-callsign { min-width: 140px; padding-right: 20px; border-right: 1px solid var(--border); }
    .telem-call-label { font-size: 0.62rem; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
    .telem-call-val { font-size: 1rem; font-weight: 700; color: var(--accent); letter-spacing: 0.05em; }
    .telem-call-sub { font-size: 0.65rem; color: var(--text-muted); margin-top: 2px; }
    .telem-fields { display: flex; flex: 1; }
    .telem-field { flex: 1; padding: 0 16px; border-right: 1px solid var(--border); text-align: center; }
    .telem-field:last-child { border-right: none; }
    .telem-label { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
    .telem-val { font-size: 1rem; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
    .telem-unit { font-size: 0.6rem; color: var(--text-muted); margin-left: 2px; }
  </style>
</head>
<body>

<div id="header">
  <h1><i class="fa-solid fa-satellite-dish"></i>Sonde App</h1>
  <div id="conn-status">
    <div id="conn-dot"></div>
    <span id="conn-label">Connecting...</span>
  </div>
  <button class="header-btn" id="scan-btn" onclick="scanToggle()">
    <i class="fa-solid fa-tower-broadcast"></i> Scan
  </button>
  <button class="header-btn danger" onclick="releaseRTL()">
    <i class="fa-solid fa-plug-circle-xmark"></i> Release RTL
  </button>

  <div class="spacer"></div>

  <!-- Draw button -->
  <button class="icon-btn" id="draw-btn" onclick="toggleDrawPanel()" title="Drawing tools">
    <i class="fa-solid fa-pencil"></i> Draw
  </button>
  <div id="draw-panel">
    <div class="draw-group-label">Tools</div>
    <button class="draw-tool-btn" id="dtool-ruler"   onclick="startDrawTool('ruler')">  <i class="fa-solid fa-ruler"></i>   Ruler</button>
    <button class="draw-tool-btn" id="dtool-line"    onclick="startDrawTool('line')">   <i class="fa-solid fa-minus"></i>   Line</button>
    <button class="draw-tool-btn" id="dtool-polygon" onclick="startDrawTool('polygon')"><i class="fa-solid fa-draw-polygon"></i> Area</button>
    <button class="draw-tool-btn" id="dtool-circle"  onclick="startDrawTool('circle')"> <i class="fa-regular fa-circle"></i> Circle</button>
    <hr class="draw-sep">
    <button class="draw-action-btn danger" id="draw-clearall-btn" onclick="clearAllDrawings()"><i class="fa-solid fa-trash"></i> Clear All</button>
  </div>

  <!-- Layers button -->
  <button class="icon-btn" id="layers-btn" onclick="toggleLayersPanel()" title="Map layers">
    <i class="fa-solid fa-layer-group"></i> Layers
  </button>

  <!-- Burger menu -->
  <button class="icon-btn" id="burger-btn" onclick="toggleBurger()" title="Menu">
    <i class="fa-solid fa-bars"></i>
  </button>
  <div id="burger-panel">
    <div class="burger-version">Build: <span id="build-hash">—</span></div>
    <button class="burger-item" onclick="upgradeApp();closeBurger()">
      <i class="fa-solid fa-arrow-up-from-bracket"></i> Check &amp; Update
    </button>
    <button class="burger-item" onclick="toggleKeyPanel();closeBurger()">
      <i class="fa-solid fa-key"></i> MapTiler API Key
    </button>
    <hr class="burger-sep">
    <button class="burger-item" onclick="restartApp()">
      <i class="fa-solid fa-rotate-right"></i> Restart App
    </button>
    <button class="burger-item danger" onclick="killApp()">
      <i class="fa-solid fa-power-off"></i> Stop App
    </button>
  </div>
  <div id="layers-panel">
    <div class="layers-group-label">Base</div>
    <button class="layer-opt active" id="lopt-osm" onclick="setLayer('osm')"><i class="fa-solid fa-map"></i> OpenStreetMap</button>
    <button class="layer-opt" id="lopt-topo" onclick="setLayer('topo')"><i class="fa-solid fa-mountain"></i> OpenTopoMap</button>
    <button class="layer-opt" id="lopt-sat" onclick="setLayer('sat')"><i class="fa-solid fa-satellite"></i> ESRI Satellite</button>
    <div class="layers-group-label">MapTiler <span style="font-size:0.58rem;color:var(--text-muted)">(API key required)</span></div>
    <button class="layer-opt" id="lopt-mt" onclick="setLayer('mt')"><i class="fa-solid fa-map"></i> MT Topo</button>
    <button class="layer-opt" id="lopt-mt-sat" onclick="setLayer('mt-sat')"><i class="fa-solid fa-satellite"></i> MT Satellite</button>
    <button class="layer-opt" id="lopt-mt-streets" onclick="setLayer('mt-streets')"><i class="fa-solid fa-road"></i> MT Streets</button>
    <div class="layers-group-label">Local (offline)</div>
    <button class="layer-opt" id="lopt-local" onclick="openLocalPanel()"><i class="fa-solid fa-hard-drive"></i> <span id="local-layer-label">Local tiles...</span></button>
  </div>
</div>

<div id="toast"></div>
<div id="draw-banner"></div>

  <span id="draw-toolbar-icon"><i class="fa-solid fa-pencil"></i></span>
  <span id="draw-toolbar-label">Draw</span>
  <span id="draw-toolbar-info"></span>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="tb-undo-btn"   onclick="undoDrawPoint()"><i class="fa-solid fa-rotate-left"></i> Undo</button>
  <button class="tb-btn finish" id="tb-finish-btn" onclick="finishDrawTool()"><i class="fa-solid fa-check"></i> Finish</button>
  <button class="tb-btn danger" id="tb-cancel-btn" onclick="clearDrawTool()"><i class="fa-solid fa-xmark"></i> Cancel</button>

  <label>Local Tilesets</label>

</div>

  <div id="key-panel-btns">
    <button class="key-save-btn" onclick="saveMtKey()">Save</button>
    <button class="key-cancel-btn" onclick="toggleKeyPanel()">Cancel</button>
  </div>
</div>

<div id="main">
  <div id="sidebar">
    <div class="side-section presets">
      <div class="side-header">
        Frequency Presets
      </div>
      <div class="side-list" id="presets-list"></div>
    </div>
    <div class="side-section sondes">
      <div class="side-header">Active Sondes</div>
      <div class="side-list" id="sondes-list">
        <div id="no-sondes">No sondes detected</div>
      </div>
    </div>
  </div>
  <div id="map"></div>
</div>

<div id="telem-bar" class="hidden">
  <div class="telem-callsign">
    <div class="telem-call-label">Callsign</div>
    <div class="telem-call-val" id="t-callsign">—</div>
    <div class="telem-call-sub" id="t-type">—</div>
  </div>
  <div class="telem-fields">
    <div class="telem-field"><div class="telem-label">Altitude</div><div class="telem-val" id="t-alt">—<span class="telem-unit">m</span></div></div>
    <div class="telem-field"><div class="telem-label">Climb</div><div class="telem-val" id="t-climb">—<span class="telem-unit">m/s</span></div></div>
    <div class="telem-field"><div class="telem-label">Speed</div><div class="telem-val" id="t-speed">—<span class="telem-unit">km/h</span></div></div>
    <div class="telem-field"><div class="telem-label">Temp</div><div class="telem-val" id="t-temp">—<span class="telem-unit">°C</span></div></div>
    <div class="telem-field"><div class="telem-label">Humidity</div><div class="telem-val" id="t-hum">—<span class="telem-unit">%</span></div></div>
    <div class="telem-field"><div class="telem-label">Frequency</div><div class="telem-val" id="t-freq">—<span class="telem-unit">MHz</span></div></div>
    <div class="telem-field"><div class="telem-label">SNR</div><div class="telem-val" id="t-snr">—<span class="telem-unit">dB</span></div></div>
  </div>
</div>

<script>
// ===== MAP =====
const map = L.map('map', { center: [46.5, 14.5], zoom: 7 });

const layers = {
  osm:  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 }),
  topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',  { attribution: '© OpenTopoMap',  maxZoom: 17 }),
  sat:  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '© Esri', maxZoom: 18 }),
};
layers.osm.addTo(map);
let currentLayer = 'osm';
let mtLayer = null;

function getMtLayer() {
  const key = localStorage.getItem('mt_key') || '';
  if (!key) return null;
  return L.tileLayer('https://api.maptiler.com/maps/topo-v2/{z}/{x}/{y}.png?key=' + key, {
    attribution: '© MapTiler © OpenStreetMap', maxZoom: 20, tileSize: 256,
  });
}

function setLayer(name) {
  if (name === currentLayer) return;

  const isMt = name === 'mt' || name === 'mt-sat' || name === 'mt-streets';
  if (isMt && !localStorage.getItem('mt_key')) {
    toggleKeyPanel();
    return;
  }

  // Remove current layer
  if (currentLayer === 'local' && localLayer) {
    map.removeLayer(localLayer); localLayer = null;
  } else if ((currentLayer === 'mt' || currentLayer === 'mt-sat' || currentLayer === 'mt-streets') && mtLayer) {
    map.removeLayer(mtLayer); mtLayer = null;
  } else if (layers[currentLayer]) {
    map.removeLayer(layers[currentLayer]);
  }

  // Add new layer
  if (isMt) {
    const key = localStorage.getItem('mt_key') || '';
    const urls = {
      'mt':         'https://api.maptiler.com/maps/topo-v2/{z}/{x}/{y}.png?key=' + key,
      'mt-sat':     'https://api.maptiler.com/maps/satellite-hybrid/{z}/{x}/{y}.jpg?key=' + key,
      'mt-streets': 'https://api.maptiler.com/maps/streets-v2/{z}/{x}/{y}.png?key=' + key,
    };
    mtLayer = L.tileLayer(urls[name], { attribution: '© MapTiler © OpenStreetMap', maxZoom: 20 });
    mtLayer.addTo(map);
  } else if (layers[name]) {
    layers[name].addTo(map);
  }

  currentLayer = name;

  // Update layers panel active state
  document.querySelectorAll('.layer-opt').forEach(b => b.classList.remove('active'));
  const loptId = 'lopt-' + name;
  const activeOpt = document.getElementById(loptId);
  if (activeOpt) activeOpt.classList.add('active');
}

// ===== LOCAL TILE SERVER =====
const MBTILESERVER = 'http://localhost:8092';
let localLayer = null;

async function openLocalPanel() {
  const panel = document.getElementById('local-panel');
  const visible = panel.style.display === 'flex';
  panel.style.display = visible ? 'none' : 'flex';
  if (visible) return;

  const list = document.getElementById('local-layers-list');
  list.innerHTML = '<span id="local-no-tiles">Loading...</span>';

  try {
    const r = await fetch(MBTILESERVER + '/services');
    const services = await r.json();
    if (!services.length) {
      list.innerHTML = '<span id="local-no-tiles">No local tiles yet — download in Map App first.</span>';
      return;
    }
    list.innerHTML = services.map(function(s) {
      return '<button class="local-layer-btn" onclick="setLocalLayer(\'' + s.id + '\',\'' + (s.name || s.id) + '\')">' + (s.name || s.id) + '</button>';
    }).join('');
  } catch(e) {
    list.innerHTML = '<span id="local-no-tiles">mbtileserver not reachable.</span>';
  }
}

function setLocalLayer(id, name) {
  document.getElementById('local-panel').style.display = 'none';

  if (localLayer) { map.removeLayer(localLayer); localLayer = null; }
  if (currentLayer === 'mt' && mtLayer) { map.removeLayer(mtLayer); mtLayer = null; }
  else if (layers[currentLayer]) { map.removeLayer(layers[currentLayer]); }

  localLayer = L.tileLayer(MBTILESERVER + '/services/' + id + '/tiles/{z}/{x}/{y}.png', {
    attribution: 'Local · ' + name, maxZoom: 18,
  });
  localLayer.addTo(map);
  currentLayer = 'local';
  document.querySelectorAll('.layer-opt').forEach(b => b.classList.remove('active'));
  const lo = document.getElementById('lopt-local');
  if (lo) lo.classList.add('active');

  document.querySelectorAll('.layer-btn').forEach(function(b) {
    b.classList.toggle('active', b.id === 'local-btn');
  });
}

// ===== MAPTILER KEY PANEL =====
function toggleKeyPanel() {
  const panel = document.getElementById('key-panel');
  const visible = panel.style.display === 'flex';
  panel.style.display = visible ? 'none' : 'flex';
  if (!visible) {
    document.getElementById('mt-key-input').value = localStorage.getItem('mt_key') || '';
    document.getElementById('mt-key-input').focus();
  }
}

function saveMtKey() {
  const key = document.getElementById('mt-key-input').value.trim();
  if (key) localStorage.setItem('mt_key', key);
  else localStorage.removeItem('mt_key');
  document.getElementById('key-panel').style.display = 'none';
  if (currentLayer === 'mt') {
    if (mtLayer) { map.removeLayer(mtLayer); mtLayer = null; }
    mtLayer = getMtLayer();
    if (mtLayer) mtLayer.addTo(map);
    else { layers.osm.addTo(map); currentLayer = 'osm'; }
  }
}

// ===== SONDES =====
const sondes = {};
let selectedSonde = null;

const COLORS = ['#deaf4a','#56b6c2','#c678dd','#98c379','#e06c75','#61afef','#d19a66','#e5c07b'];
function sondeColor(id) {
  let h = 0; for (const c of id) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
  return COLORS[Math.abs(h) % COLORS.length];
}

function makeSondeIcon(id) {
  const col = sondeColor(id);
  return L.divIcon({
    className: 'sonde-marker-icon',
    html: '<svg width="26" height="34" viewBox="0 0 26 34">'
      + '<circle cx="13" cy="13" r="10" fill="' + col + '" opacity="0.92" stroke="#0a0a12" stroke-width="2"/>'
      + '<line x1="13" y1="23" x2="13" y2="34" stroke="' + col + '" stroke-width="2" opacity="0.6"/>'
      + '<text x="13" y="17" text-anchor="middle" font-size="10" fill="#0a0a12" font-weight="700">↑</text>'
      + '</svg>',
    iconSize: [26, 34], iconAnchor: [13, 34], popupAnchor: [0, -36],
  });
}

function parseFreq(freq) {
  if (freq == null) return null;
  if (typeof freq === 'string') return parseFloat(freq.replace(/[^0-9.]/g, ''));
  return parseFloat(freq);
}

function freqDisplay(freq) {
  if (freq == null) return '—';
  const n = parseFreq(freq);
  return isNaN(n) ? String(freq) : n.toFixed(3);
}

function updateSonde(data) {
  const id = data.id || data.callsign;
  if (!id || data.lat == null || data.lon == null) return;
  const pos = [data.lat, data.lon];
  const col = sondeColor(id);

  if (!sondes[id]) {
    const marker = L.marker(pos, { icon: makeSondeIcon(id) }).addTo(map);
    marker.bindPopup('<b style="color:#deaf4a">' + id + '</b><br>' + (data.type || '') + ' · ' + freqDisplay(data.freq) + ' MHz');
    marker.on('click', () => selectSonde(id));
    const polyline = L.polyline([pos], { color: col, weight: 2, opacity: 0.65 }).addTo(map);
    sondes[id] = {
      telem: data,
      marker,
      track: [{ lat: data.lat, lon: data.lon, alt: data.alt, time: new Date() }],
      polyline,
    };
  } else {
    sondes[id].telem = data;
    sondes[id].marker.setLatLng(pos);
    sondes[id].track.push({ lat: data.lat, lon: data.lon, alt: data.alt, time: new Date() });
    sondes[id].polyline.setLatLngs(sondes[id].track.map(p => [p.lat, p.lon]));
  }

  renderSondeList();
  if (selectedSonde === id) updateTelemBar(data);
}

function selectSonde(id) {
  selectedSonde = id;
  document.querySelectorAll('.sonde-item').forEach(el => el.classList.toggle('selected', el.dataset.id === id));
  if (sondes[id]) {
    updateTelemBar(sondes[id].telem);
    map.panTo([sondes[id].telem.lat, sondes[id].telem.lon]);
  }
}

function fmt(v, dec) {
  if (dec === undefined) dec = 0;
  return v != null && !isNaN(v) ? parseFloat(v).toFixed(dec) : '—';
}

function updateTelemBar(d) {
  const id = d.id || d.callsign;
  document.getElementById('telem-bar').classList.remove('hidden');
  document.getElementById('t-callsign').textContent = id || '—';
  document.getElementById('t-type').textContent = [d.type, freqDisplay(d.freq) + ' MHz'].filter(Boolean).join(' · ');
  document.getElementById('t-alt').innerHTML   = fmt(d.alt)     + '<span class="telem-unit">m</span>';
  document.getElementById('t-climb').innerHTML = fmt(d.vel_v,1) + '<span class="telem-unit">m/s</span>';
  const spd = d.vel_h != null ? d.vel_h * 3.6 : null;
  document.getElementById('t-speed').innerHTML = fmt(spd,1)     + '<span class="telem-unit">km/h</span>';
  document.getElementById('t-temp').innerHTML  = fmt(d.temp,1)  + '<span class="telem-unit">°C</span>';
  document.getElementById('t-hum').innerHTML   = fmt(d.humidity,0) + '<span class="telem-unit">%</span>';
  document.getElementById('t-freq').innerHTML  = freqDisplay(d.freq) + '<span class="telem-unit">MHz</span>';
  document.getElementById('t-snr').innerHTML   = fmt(d.snr,1)   + '<span class="telem-unit">dB</span>';
}

function renderSondeList() {
  const list = document.getElementById('sondes-list');
  const ids = Object.keys(sondes);
  if (!ids.length) { list.innerHTML = '<div id="no-sondes">No sondes detected</div>'; return; }
  list.innerHTML = ids.map(function(id) {
    const d = sondes[id].telem;
    const alt = d.alt != null ? Math.round(d.alt) + 'm' : '—';
    const sel = selectedSonde === id ? ' selected' : '';
    return '<div class="sonde-item' + sel + '" data-id="' + id + '" onclick="selectSonde(\'' + id + '\')">'
      + '<div class="sonde-dot"></div>'
      + '<div class="sonde-info">'
      + '<div class="sonde-call">' + id + '</div>'
      + '<div class="sonde-sub">' + (d.type || '?') + ' · ' + freqDisplay(d.freq) + ' MHz</div>'
      + '</div>'
      + '<div class="sonde-alt">' + alt + '</div>'
      + '<button class="gpx-btn" onclick="event.stopPropagation(); exportGPX(\'' + id + '\')" title="Download track as GPX">'
      + '<i class="fa-solid fa-download"></i> GPX</button>'
      + '</div>';
  }).join('');
}

// ===== GPX EXPORT =====
function exportGPX(id) {
  const s = sondes[id];
  if (!s || !s.track.length) return;
  const pts = s.track.map(function(p) {
    const ele = p.alt != null ? '<ele>' + p.alt.toFixed(1) + '</ele>' : '';
    return '    <trkpt lat="' + p.lat + '" lon="' + p.lon + '">' + ele + '<time>' + p.time.toISOString() + '</time></trkpt>';
  }).join('\n');
  const gpx = '<?xml version="1.0" encoding="UTF-8"?>\n'
    + '<gpx version="1.1" creator="Sonde App" xmlns="http://www.topografix.com/GPX/1/1">\n'
    + '  <trk><name>' + id + '</name><trkseg>\n'
    + pts + '\n'
    + '  </trkseg></trk>\n'
    + '</gpx>';
  const blob = new Blob([gpx], { type: 'application/gpx+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = id + '.gpx';
  a.click();
  URL.revokeObjectURL(a.href);
}


// ===== BURGER MENU =====
function toggleBurger() {
  const p = document.getElementById('burger-panel');
  const wasOpen = p.classList.contains('open');
  closeAllPanels();
  if (!wasOpen) p.classList.add('open');
}
function closeBurger() {
  document.getElementById('burger-panel').classList.remove('open');
}

// ===== LAYERS PANEL =====
function toggleLayersPanel() {
  const p = document.getElementById('layers-panel');
  const wasOpen = p.classList.contains('open');
  closeAllPanels();
  if (!wasOpen) p.classList.add('open');
}

function closeAllPanels() {
  document.getElementById('burger-panel').classList.remove('open');
  document.getElementById('layers-panel').classList.remove('open');
  document.getElementById('draw-panel').classList.remove('open');
  const lp = document.getElementById('local-panel');
  if (lp) lp.style.display = 'none';
  const kp = document.getElementById('key-panel');
  if (kp) kp.style.display = 'none';
}

// close panels on outside click
document.addEventListener('click', function(e) {
  if (!e.target.closest('#burger-btn') && !e.target.closest('#burger-panel')) closeBurger();
  if (!e.target.closest('#layers-btn') && !e.target.closest('#layers-panel') && !e.target.closest('#local-panel')) {
    document.getElementById('layers-panel').classList.remove('open');
  }

    document.getElementById('draw-panel').classList.remove('open');
  }
});

// ===== VERSION =====
async function loadVersion() {
  try {
    const r = await fetch('/api/version');
    const d = await r.json();
    document.getElementById('build-hash').textContent = d.version;
  } catch(e) {}
}

// ===== RESTART / KILL =====
async function restartApp() {
  closeBurger();
  showToast('Restarting...');
  await fetch('/api/restart', { method: 'POST' });
}
async function killApp() {
  closeBurger();
  const ok = confirm('Stop the Sonde App service?');
  if (!ok) return;
  await fetch('/api/kill', { method: 'POST' });
}


// ===== DRAWING ENGINE =====
const draw = {
  tool: null,
  points: [],
  markers: [],
  shape: null,
  previewLine: null,   // rubber-band line to cursor
  preview: null,       // circle preview
  circleCenter: null,
};

const DRAW_COLOR = '#deaf4a';

function fmtDist(m) {
  return m >= 1000 ? (m / 1000).toFixed(2) + ' km' : Math.round(m) + ' m';
}
function haversine(a, b) {
  const R = 6371000, toR = Math.PI / 180;
  const dLat = (b.lat - a.lat) * toR, dLng = (b.lng - a.lng) * toR;
  const s = Math.sin(dLat/2)**2 + Math.cos(a.lat*toR)*Math.cos(b.lat*toR)*Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(s));
}

// ── Toolbar helpers ──
const TOOL_META = {
  ruler:   { icon: 'fa-ruler',        label: 'Ruler'   },
  line:    { icon: 'fa-minus',        label: 'Line'    },
  polygon: { icon: 'fa-draw-polygon', label: 'Area'    },
  circle:  { icon: 'fa-circle',       label: 'Circle'  },
};

function showToolbar(tool) {
  const tb = document.getElementById('draw-toolbar');
  const meta = TOOL_META[tool] || {};
  document.getElementById('draw-toolbar-icon').innerHTML = '<i class="fa-solid ' + (meta.icon || 'fa-pencil') + '"></i>';
  document.getElementById('draw-toolbar-label').textContent = meta.label || tool;
  tb.classList.add('show');
  updateToolbarButtons();
}
function hideToolbar() {
  document.getElementById('draw-toolbar').classList.remove('show');
}
function setToolbarInfo(text) {
  document.getElementById('draw-toolbar-info').textContent = text || '';
}
function updateToolbarButtons() {
  const hasPts  = draw.points.length > 0;
  const canFin  = draw.tool === 'circle' ? !!draw.circleCenter : draw.points.length >= 2;
  const canUndo = draw.tool !== 'circle' && hasPts;
  document.getElementById('tb-finish-btn').hidden = !canFin;
  document.getElementById('tb-undo-btn').hidden   = !canUndo;
}

// ── Tool state ──
function setDrawInfo(text) { setToolbarInfo(text); }  // keep old callers working

function clearDrawTool() {
  draw.markers.forEach(m => map.removeLayer(m));
  draw.markers = [];
  if (draw.shape)       { map.removeLayer(draw.shape);       draw.shape       = null; }
  if (draw.previewLine) { map.removeLayer(draw.previewLine); draw.previewLine = null; }
  if (draw.preview)     { map.removeLayer(draw.preview);     draw.preview     = null; }
  draw.points = [];
  draw.tool = null;
  draw.circleCenter = null;
  document.getElementById('map').classList.remove('draw-active');
  setDrawBanner('');
  hideToolbar();
  // update draw panel tool buttons
  ['dtool-ruler','dtool-line','dtool-polygon','dtool-circle'].forEach(id =>
    document.getElementById(id).classList.remove('active'));
}

function startDrawTool(tool) {
  clearDrawTool();
  draw.tool = tool;
  document.getElementById('map').classList.add('draw-active');
  document.getElementById('dtool-' + tool).classList.add('active');
  // close draw panel so it doesn't block
  document.getElementById('draw-panel').classList.remove('open');
  const banners = {
    ruler:   'Click to place points and measure distance.',
    line:    'Click to place points for a line.',
    polygon: 'Click corners of the area.',
    circle:  'Click to set the circle center.',
  };
  setDrawBanner(banners[tool]);
  showToolbar(tool);
}

function addDrawPoint(latlng) {
  if (!draw.tool || draw.tool === 'circle') return;
  draw.points.push(latlng);
  const dot = L.circleMarker(latlng, {
    radius: 5, color: DRAW_COLOR, fillColor: DRAW_COLOR, fillOpacity: 1, weight: 2,
  }).addTo(map);
  draw.markers.push(dot);
  redrawShape();
  if (draw.tool === 'ruler' && draw.points.length >= 2) {
    let total = 0;
    for (let i = 1; i < draw.points.length; i++) total += haversine(draw.points[i-1], draw.points[i]);
    setToolbarInfo('Total: ' + fmtDist(total));
  }
  updateToolbarButtons();
}

function undoDrawPoint() {
  if (!draw.points.length) return;
  draw.points.pop();
  const m = draw.markers.pop();
  if (m) map.removeLayer(m);
  redrawShape();
  if (draw.tool === 'ruler' && draw.points.length >= 2) {
    let total = 0;
    for (let i = 1; i < draw.points.length; i++) total += haversine(draw.points[i-1], draw.points[i]);
    setToolbarInfo('Total: ' + fmtDist(total));
  } else if (draw.tool === 'ruler') {
    setToolbarInfo('');
  }
  updateToolbarButtons();
}

function redrawShape() {
  if (draw.shape) { map.removeLayer(draw.shape); draw.shape = null; }
  if (draw.points.length < 2) return;
  const lls = draw.points.map(p => [p.lat, p.lng]);
  if (draw.tool === 'polygon') {
    draw.shape = L.polygon(lls, { color: DRAW_COLOR, weight: 2, fillOpacity: 0.12 }).addTo(map);
  } else {
    draw.shape = L.polyline(lls, { color: DRAW_COLOR, weight: 3 }).addTo(map);
  }
}

function updateRubberBand(latlng) {
  if (draw.previewLine) { map.removeLayer(draw.previewLine); draw.previewLine = null; }
  if (!draw.tool || draw.tool === 'circle' || !draw.points.length) return;
  const last = draw.points[draw.points.length - 1];
  draw.previewLine = L.polyline([[last.lat, last.lng], [latlng.lat, latlng.lng]], {
    color: DRAW_COLOR, weight: 2, opacity: 0.55, dashArray: '7,7',
  }).addTo(map);
}

function finishDrawTool() {
  if (!draw.tool) return;
  if (draw.tool === 'circle') {
    draw.preview = null;
    draw.circleCenter = null;
  } else {
    if (draw.points.length < 2) return;
    if (draw.shape)  drawnShapes.push(draw.shape);
    draw.markers.forEach(m => drawnShapes.push(m));
    draw.shape   = null;
    draw.markers = [];
    draw.points  = [];
  }
  if (draw.previewLine) { map.removeLayer(draw.previewLine); draw.previewLine = null; }
  draw.tool = null;
  document.getElementById('map').classList.remove('draw-active');
  ['dtool-ruler','dtool-line','dtool-polygon','dtool-circle'].forEach(id =>
    document.getElementById(id).classList.remove('active'));
  setDrawBanner('');
  hideToolbar();
}

function clearAllDrawings() {
  clearDrawTool();
  drawnShapes.forEach(s => map.removeLayer(s));
  drawnShapes.length = 0;
}

const drawnShapes = [];

function handleCircleClick(latlng) {
  if (!draw.circleCenter) {
    draw.circleCenter = latlng;
    const dot = L.circleMarker(latlng, {
      radius: 6, color: DRAW_COLOR, fillColor: DRAW_COLOR, fillOpacity: 1, weight: 2,
    }).addTo(map);
    draw.markers.push(dot);
    draw.preview = L.circle(latlng, { radius: 1, color: DRAW_COLOR, weight: 2, fillOpacity: 0.1 }).addTo(map);
    setDrawBanner('Move mouse to set radius, then click to confirm.');
    updateToolbarButtons();
  } else {
    const r = haversine(draw.circleCenter, latlng);
    if (draw.preview) { drawnShapes.push(draw.preview); draw.preview = null; }
    draw.markers.forEach(m => drawnShapes.push(m));
    draw.markers = [];
    draw.circleCenter = null;
    if (draw.previewLine) { map.removeLayer(draw.previewLine); draw.previewLine = null; }
    draw.tool = null;
    document.getElementById('map').classList.remove('draw-active');
    document.getElementById('dtool-circle').classList.remove('active');
    setDrawBanner('');
    hideToolbar();
  }
}

function initDrawEvents() {
  map.on('click', function(e) {
    if (!draw.tool) return;
    if (draw.tool === 'circle') {
      handleCircleClick(e.latlng);
    } else {
      addDrawPoint(e.latlng);
    }
  });
  map.on('mousemove', function(e) {
    if (draw.tool === 'circle' && draw.circleCenter && draw.preview) {
      const r = haversine(draw.circleCenter, e.latlng);
      draw.preview.setRadius(r);
      setToolbarInfo('Radius: ' + fmtDist(r));
    } else {
      updateRubberBand(e.latlng);
    }
  });
  document.addEventListener('keydown', function(e) {
    if (!draw.tool) return;
    if (e.key === 'Escape')                                          clearDrawTool();
    if ((e.key === 'Backspace' || e.key === 'Delete') && draw.tool !== 'circle') undoDrawPoint();
    if (e.key === 'Enter')                                           finishDrawTool();
  });
}

// ===== DRAW PANEL TOGGLE =====
function toggleDrawPanel() {
  const p = document.getElementById('draw-panel');
  const wasOpen = p.classList.contains('open');
  closeAllPanels();
  if (!wasOpen) p.classList.add('open');
}

// ===== SCAN / RELEASE =====
let scanning = false;

async function scanToggle() {
  const btn = document.getElementById('scan-btn');
  if (!scanning) {
    await fetch('/api/scan/start', { method: 'POST' });
    scanning = true;
    btn.innerHTML = '<i class="fa-solid fa-stop"></i> Stop';
    btn.classList.add('active');
  } else {
    await fetch('/api/scan/stop', { method: 'POST' });
    scanning = false;
    btn.innerHTML = '<i class="fa-solid fa-tower-broadcast"></i> Scan';
    btn.classList.remove('active');
  }
}

async function releaseRTL() {
  await fetch('/api/rtl/release', { method: 'POST' });
}

// ===== PRESETS =====
let presets = [];
let editingId = null;

async function loadPresets() {
  const r = await fetch('/api/presets');
  presets = await r.json();
  renderPresets();
}

async function savePresets() {
  await fetch('/api/presets', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(presets),
  });
}

function renderPresets() {
  const list = document.getElementById('presets-list');
  const activeFreqs = new Set(Object.values(sondes).map(function(s) {
    const f = parseFreq(s.telem.freq);
    return f != null ? f.toFixed(2) : null;
  }).filter(Boolean));

  list.innerHTML = presets.map(function(p) {
    const isActive = activeFreqs.has(parseFloat(p.freq).toFixed(2));
    const editOpen = editingId === p.id;
    const meta = [p.type, !p.verified ? '· unverified' : ''].filter(Boolean).join(' ');
    return '<div class="preset-item' + (isActive ? ' active-freq' : '') + '">'
      + '<div class="preset-country">' + p.country + '</div>'
      + '<div class="preset-info">'
      + '<div class="preset-name">' + p.name + '</div>'
      + '<div class="preset-meta">' + meta + '</div>'
      + '</div>'
      + '<div class="preset-freq">' + parseFloat(p.freq).toFixed(2) + '</div>'
      + '<button class="preset-edit-btn" onclick="toggleEdit(\'' + p.id + '\')" title="Edit"><i class="fa-solid fa-pen"></i></button>'
      + '</div>'
      + '<div class="preset-edit-row' + (editOpen ? ' open' : '') + '" id="edit-' + p.id + '">'
      + '<div class="edit-fields">'
      + '<input type="text"   id="ef-name-' + p.id + '"    value="' + p.name    + '" placeholder="Name">'
      + '<input type="text"   id="ef-country-' + p.id + '" value="' + p.country + '" placeholder="Country" maxlength="3">'
      + '<input type="number" id="ef-freq-' + p.id + '"    value="' + p.freq    + '" placeholder="MHz" step="0.05">'
      + '<input type="text"   id="ef-type-' + p.id + '"    value="' + (p.type || '') + '" placeholder="Type">'
      + '</div>'
      + '<div class="edit-actions">'
      + '<button class="edit-save-btn"   onclick="savePreset(\'' + p.id + '\')">Save</button>'
      + '<button class="edit-cancel-btn" onclick="toggleEdit(null)">Cancel</button>'
      + '<button class="edit-del-btn"    onclick="deletePreset(\'' + p.id + '\')">Delete</button>'
      + '</div></div>';
  }).join('');

  const addBtn = document.createElement('button');
  addBtn.id = 'add-preset-btn';
  addBtn.textContent = '+ Add preset';
  addBtn.onclick = addPreset;
  list.appendChild(addBtn);
}

function toggleEdit(id) {
  editingId = editingId === id ? null : id;
  renderPresets();
  if (editingId) {
    const el = document.getElementById('edit-' + editingId);
    if (el) el.scrollIntoView({ block: 'nearest' });
  }
}

function savePreset(id) {
  const p = presets.find(function(x) { return x.id === id; });
  if (!p) return;
  p.name    = document.getElementById('ef-name-' + id).value.trim();
  p.country = document.getElementById('ef-country-' + id).value.trim().toUpperCase();
  p.freq    = parseFloat(document.getElementById('ef-freq-' + id).value);
  p.type    = document.getElementById('ef-type-' + id).value.trim();
  p.verified = false;
  editingId = null;
  savePresets();
  renderPresets();
}

function deletePreset(id) {
  presets = presets.filter(function(p) { return p.id !== id; });
  editingId = null;
  savePresets();
  renderPresets();
}

function addPreset() {
  const newId = 'custom_' + Date.now();
  presets.push({ id: newId, name: 'New Station', country: '??', freq: 403.00, type: 'RS41', verified: false });
  editingId = newId;
  savePresets();
  renderPresets();
  const el = document.getElementById('edit-' + newId);
  if (el) el.scrollIntoView({ block: 'nearest' });
}

// ===== SOCKET.IO → auto_rx =====
function connectAutoRx() {
  const dot   = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');
  try {
    const socket = io('http://localhost:5000/update_status', {
      transports: ['websocket'],
      reconnectionDelay: 3000,
      reconnectionAttempts: Infinity,
    });
    socket.on('connect',       function() { dot.className = 'on';  label.textContent = 'Connected'; });
    socket.on('disconnect',    function() { dot.className = 'off'; label.textContent = 'Disconnected'; });
    socket.on('connect_error', function() { dot.className = 'off'; label.textContent = 'auto_rx offline'; });
    socket.on('telemetry_event', updateSonde);
  } catch(e) {
    dot.className = 'off';
    label.textContent = 'Error';
  }
}

// ===== UPGRADE =====
function showToast(msg, duration) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, duration || 3000);
}

async function upgradeApp() {
  const btn = event.currentTarget;
  btn.style.pointerEvents = 'none';
  showToast('Checking for updates...', 60000);
  try {
    const r = await fetch('/api/upgrade', { method: 'POST' });
    const data = await r.json();
    if (!data.ok) {
      showToast('Update failed: ' + data.msg);
      btn.style.pointerEvents = '';
      return;
    }
    if (data.msg.includes('Already up to date')) {
      showToast('Already up to date.');
      btn.style.pointerEvents = '';
      return;
    }
    showToast('Updated. Reloading in 3s...', 4000);
    setTimeout(function() { location.reload(); }, 3000);
  } catch(e) {
    showToast('Update error.');
    btn.style.pointerEvents = '';
  }
}

loadPresets();
  loadVersion();
  initDrawEvents();
connectAutoRx();
</script>
